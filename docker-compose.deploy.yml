services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paperclip}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal

  server:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://paperclip:${DB_PASSWORD:-paperclip}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "https://${DOMAIN:-paperclip.moti.cl}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-paperclip}.rule=Host(`${DOMAIN:-paperclip.moti.cl}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-paperclip}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME:-paperclip}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME:-paperclip}.loadbalancer.server.port=3100"

volumes:
  pgdata:
  paperclip-data:

networks:
  internal:
    driver: bridge
